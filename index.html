<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capa LinkedIn - Wagner Ramos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- html2canvas para gerar a imagem -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0B1E33;
            --bg2: #0F2A40;
            --bg3: #153450;
            --bg4: #1A3E5A;
            --text: #F0F4FA;
            --mid: #A0B3CC;
            --low: #62748C;
            --gold: #C4A35A;
            --glt: #D8B87A;
            --gdim: rgba(196,163,90,0.12);
            --line: rgba(255,255,255,.08);
            --line2: rgba(255,255,255,.04);
            --lineg: rgba(196,163,90,.25);
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Inter', system-ui, sans-serif;
        }

        body {
            background: #1e1e2f; /* apenas para contraste fora da capa */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--sans);
            padding: 20px;
        }

        .canvas-container {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }

        #linkedin-banner {
            width: 1584px;   /* largura oficial da capa do LinkedIn */
            height: 396px;    /* altura oficial */
            background: var(--bg);
            position: relative;
            overflow: hidden;
            font-family: var(--sans);
            color: var(--text);
        }

        /* Gradientes e elementos decorativos (mesmos do site) */
        #linkedin-banner::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -5%;
            width: 50%;
            height: 80%;
            background: radial-gradient(ellipse at 60% 35%, rgba(26,62,90,.8) 0%, rgba(11,30,51,0) 70%);
            pointer-events: none;
        }
        #linkedin-banner::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: 10%;
            width: 40%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(196,163,90,.07) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Linha vertical decorativa */
        .vline {
            position: absolute;
            left: 60px;
            top: 15%;
            bottom: 15%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(196,163,90,.2), transparent);
        }

        /* Coordenada no canto superior direito (mesmo estilo) */
        .coord {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--low);
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-family: var(--sans);
            font-weight: 300;
        }

        /* Nome grande */
        .name {
            position: absolute;
            bottom: 50px;
            left: 60px;
            font-family: var(--serif);
            font-size: 92px;
            font-weight: 300;
            line-height: 0.88;
            letter-spacing: -0.02em;
            color: var(--text);
            z-index: 2;
        }
        .name .n2 {
            display: block;
            font-style: italic;
            font-weight: 300;
            color: var(--mid);
            padding-left: 120px;
            margin-top: -10px;
        }
        .name .n3 {
            display: block;
            font-weight: 700;
            margin-top: -10px;
        }

        /* Linha dourada */
        .gold-line {
            position: absolute;
            bottom: 170px;
            left: 60px;
            width: 240px;
            height: 1px;
            background: linear-gradient(to right, var(--lineg), var(--line), transparent);
        }

        /* Título / descrição */
        .title {
            position: absolute;
            bottom: 70px;
            right: 60px;
            text-align: right;
            font-family: var(--sans);
            z-index: 2;
        }
        .title .main {
            font-size: 28px;
            font-weight: 300;
            color: var(--text);
            line-height: 1.2;
        }
        .title .main strong {
            font-weight: 500;
            color: var(--glt);
        }
        .title .sub {
            font-size: 16px;
            font-weight: 300;
            color: var(--mid);
            letter-spacing: 1px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Eyebrow (detalhe) */
        .eyebrow {
            position: absolute;
            top: 40px;
            left: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2;
        }
        .edot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            animation: blink 3s infinite;
        }
        .etxt {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--mid);
        }
        .esep {
            width: 40px;
            height: 1px;
            background: var(--line);
        }

        /* Números de impacto (opcional) */
        .stats {
            position: absolute;
            top: 40px;
            right: 60px;
            display: flex;
            gap: 40px;
            z-index: 2;
        }
        .stat-item {
            text-align: right;
        }
        .stat-number {
            font-family: var(--serif);
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            line-height: 1;
        }
        .stat-number .u {
            font-size: 16px;
            color: var(--gold);
            font-weight: 300;
            margin-left: 2px;
        }
        .stat-label {
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--low);
        }

        @keyframes blink {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: .2; transform: scale(1.7); }
        }

        /* Botão download */
        .btn-download {
            background: var(--gold);
            border: none;
            color: var(--bg);
            font-family: var(--sans);
            font-size: 18px;
            font-weight: 500;
            padding: 14px 32px;
            border-radius: 40px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
        }
        .btn-download:hover {
            background: var(--glt);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(196,163,90,0.3);
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <div id="linkedin-banner">
            <!-- Linha vertical decorativa -->
            <div class="vline"></div>
            <!-- Coordenada -->
            <div class="coord">19°55'S · 43°56'W</div>
            <!-- Eyebrow -->
            <div class="eyebrow">
                <span class="edot"></span>
                <span class="etxt">Portfólio Profissional</span>
                <span class="esep"></span>
                <span style="font-size:12px; color:var(--low); letter-spacing:1px;">2026</span>
            </div>
            <!-- Stats rápidos (opcional, pode remover se preferir) -->
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">R$500<span class="u">k</span></div>
                    <div class="stat-label">Recursos viabilizados</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">−75<span class="u">%</span></div>
                    <div class="stat-label">Tempo de análise</div>
                </div>
            </div>
            <!-- Nome -->
            <div class="name">
                Wagner<span class="n2">Douglas</span><span class="n3">Ramos</span>
            </div>
            <!-- Linha dourada -->
            <div class="gold-line"></div>
            <!-- Título e área de atuação -->
            <div class="title">
                <div class="main"><strong>PMO</strong> · Projetos · <strong>BI</strong></div>
                <div class="sub">Engenharia · Dados · Estratégia</div>
            </div>
        </div>
    </div>

    <button class="btn-download" id="downloadBtn">⬇ Baixar Capa para LinkedIn</button>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const banner = document.getElementById('linkedin-banner');
            // Usar html2canvas para capturar o elemento
            html2canvas(banner, {
                scale: 2, // alta resolução
                backgroundColor: '#0B1E33',
                allowTaint: false,
                useCORS: true,
                logging: false,
                windowWidth: 1584,
                windowHeight: 396
            }).then((canvas) => {
                // Criar link de download
                const link = document.createElement('a');
                link.download = 'linkedin-capa-wagner-ramos.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(error => {
                console.error('Erro ao gerar imagem:', error);
                alert('Não foi possível gerar a imagem. Verifique o console.');
            });
        });
    </script>
    <!-- Pequena nota: as dimensões da capa são 1584x396, que é o tamanho recomendado pelo LinkedIn. O download gerará um PNG com essas dimensões em alta resolução. -->
</body>
</html>
