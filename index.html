<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capa LinkedIn · Wagner Ramos</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0B1E33;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .container {
            text-align: center;
        }
        canvas {
            width: 100%;
            max-width: 792px; /* metade do tamanho real para visualização */
            height: auto;
            border: 2px solid #C4A35A;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn {
            margin-top: 30px;
            background: linear-gradient(135deg, #C4A35A, #D8B87A);
            color: #0B1E33;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 14px 32px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(196, 163, 90, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .note {
            color: #A0B3CC;
            font-size: 0.8rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="linkedinBanner" width="1584" height="396"></canvas>
        <br>
        <button class="btn" id="downloadBtn">⬇ Baixar Capa LinkedIn</button>
        <p class="note">Dimensões: 1584 x 396 px — ideal para capa do LinkedIn.</p>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('linkedinBanner');
            const ctx = canvas.getContext('2d');

            // Cores do tema (mesmas do site)
            const colors = {
                bg: '#0B1E33',
                text: '#F0F4FA',
                mid: '#A0B3CC',
                low: '#62748C',
                gold: '#C4A35A',
                glt: '#D8B87A',
                line: 'rgba(255,255,255,0.08)',
                lineg: 'rgba(196,163,90,0.25)'
            };

            const width = canvas.width;
            const height = canvas.height;

            // Fundo principal
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, width, height);

            // Gradiente radial suave (canto inferior esquerdo)
            const gradient = ctx.createRadialGradient(200, height - 100, 50, 250, height - 150, 600);
            gradient.addColorStop(0, 'rgba(196,163,90,0.1)');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Outro gradiente no canto superior direito
            const gradient2 = ctx.createRadialGradient(width - 200, 100, 50, width - 300, 150, 700);
            gradient2.addColorStop(0, 'rgba(26,62,90,0.5)');
            gradient2.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient2;
            ctx.fillRect(0, 0, width, height);

            // Linha vertical fina (lado esquerdo)
            ctx.strokeStyle = colors.lineg;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(80, 60);
            ctx.lineTo(80, height - 60);
            ctx.stroke();

            // Linha horizontal fina (parte inferior)
            ctx.beginPath();
            ctx.strokeStyle = colors.line;
            ctx.lineWidth = 0.5;
            ctx.moveTo(100, height - 70);
            ctx.lineTo(width - 100, height - 70);
            ctx.stroke();

            // Coordenada geográfica (canto superior direito, vertical)
            ctx.save();
            ctx.translate(width - 50, 100);
            ctx.rotate(-Math.PI/2);
            ctx.font = '400 12px "Inter", monospace';
            ctx.fillStyle = colors.low;
            ctx.textAlign = 'left';
            ctx.fillText('19°55\'S · 43°56\'W', 0, 0);
            ctx.restore();

            // Nome principal
            ctx.font = '300 100px "Cormorant Garamond", serif';
            ctx.fillStyle = colors.text;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('Wagner', 120, 100);

            ctx.font = '300 100px "Cormorant Garamond", serif';
            ctx.fillStyle = colors.mid;
            ctx.fillText('Douglas', 120, 210);

            ctx.font = '700 110px "Cormorant Garamond", serif';
            ctx.fillStyle = colors.text;
            ctx.fillText('Ramos', 120, 290);

            // Linha dourada abaixo do nome
            ctx.strokeStyle = colors.gold;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(120, 380);
            ctx.lineTo(600, 380);
            ctx.stroke();

            // Título / tags
            ctx.font = '400 18px "Inter", sans-serif';
            ctx.fillStyle = colors.gold;
            ctx.fillText('PMO · Projetos · Business Intelligence', 120, 350);

            // Pequeno detalhe: ponto dourado pulsante (estático aqui)
            ctx.beginPath();
            ctx.arc(80, 60, 4, 0, 2 * Math.PI);
            ctx.fillStyle = colors.gold;
            ctx.fill();

            // Canto inferior direito: um "ghost" sutil PMO
            ctx.font = '700 140px "Cormorant Garamond", serif';
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            ctx.fillText('PMO', width - 40, height - 20);

            // Botão de download
            document.getElementById('downloadBtn').addEventListener('click', function() {
                // Cria um link temporário para download
                const link = document.createElement('a');
                link.download = 'wagner-ramos-linkedin-capa.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            // Exibe no console se ocorrer tudo bem
            console.log('Capa gerada com sucesso!');
        })();
    </script>
</body>
</html>
