<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capa LinkedIn · Wagner Ramos (estilo portfólio)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0B1E33;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .container {
            text-align: center;
        }
        canvas {
            width: 100%;
            max-width: 792px; /* metade do tamanho real para visualização */
            height: auto;
            border: 2px solid #C4A35A;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn {
            margin-top: 30px;
            background: linear-gradient(135deg, #C4A35A, #D8B87A);
            color: #0B1E33;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 14px 32px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(196, 163, 90, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .note {
            color: #A0B3CC;
            font-size: 0.8rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="linkedinBanner" width="1584" height="396"></canvas>
        <br>
        <button class="btn" id="downloadBtn">⬇ Baixar Capa LinkedIn</button>
        <p class="note">Dimensões: 1584 x 396 px — ideal para capa do LinkedIn.</p>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('linkedinBanner');
            const ctx = canvas.getContext('2d');

            // Cores do tema (mesmas do site)
            const colors = {
                bg: '#0B1E33',
                text: '#F0F4FA',
                mid: '#A0B3CC',
                low: '#62748C',
                gold: '#C4A35A',
                glt: '#D8B87A',
                line: 'rgba(255,255,255,0.08)',
                lineg: 'rgba(196,163,90,0.25)'
            };

            const width = canvas.width;
            const height = canvas.height;

            // Fundo principal
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, width, height);

            // Gradientes suaves (como no site)
            const grad1 = ctx.createRadialGradient(200, height - 100, 50, 250, height - 150, 600);
            grad1.addColorStop(0, 'rgba(196,163,90,0.1)');
            grad1.addColorStop(1, 'transparent');
            ctx.fillStyle = grad1;
            ctx.fillRect(0, 0, width, height);

            const grad2 = ctx.createRadialGradient(width - 200, 100, 50, width - 300, 150, 700);
            grad2.addColorStop(0, 'rgba(26,62,90,0.5)');
            grad2.addColorStop(1, 'transparent');
            ctx.fillStyle = grad2;
            ctx.fillRect(0, 0, width, height);

            // Linha vertical esquerda (como no site)
            ctx.strokeStyle = colors.lineg;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(80, 60);
            ctx.lineTo(80, height - 60);
            ctx.stroke();

            // Coordenada geográfica no canto superior direito (vertical)
            ctx.save();
            ctx.translate(width - 50, 100);
            ctx.rotate(-Math.PI/2);
            ctx.font = '400 12px "Inter", monospace';
            ctx.fillStyle = colors.low;
            ctx.textAlign = 'left';
            ctx.fillText('19°55\'S · 43°56\'W', 0, 0);
            ctx.restore();

            // ===== LADO ESQUERDO =====
            // Eyebrow (igual ao site)
            const eyebrowY = 70;
            // Ponto dourado
            ctx.beginPath();
            ctx.arc(120, eyebrowY + 3, 4, 0, 2 * Math.PI);
            ctx.fillStyle = colors.gold;
            ctx.fill();

            // Texto "Portfólio · 2026"
            ctx.font = '400 14px "Inter", sans-serif';
            ctx.fillStyle = colors.mid;
            ctx.fillText('Portfólio', 140, eyebrowY);

            // Linha separadora
            ctx.strokeStyle = colors.line;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(240, eyebrowY);
            ctx.lineTo(270, eyebrowY);
            ctx.stroke();

            // Ano 2026
            ctx.font = '400 14px "Inter", sans-serif';
            ctx.fillStyle = colors.low;
            ctx.fillText('2026', 280, eyebrowY);

            // Nome (três linhas, como no site)
            ctx.font = '300 58px "Cormorant Garamond", serif';
            ctx.fillStyle = colors.text;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('Wagner', 120, 110);

            ctx.font = '300 58px "Cormorant Garamond", serif';
            ctx.fillStyle = colors.mid;
            ctx.fillText('Douglas', 120, 170);

            ctx.font = '700 64px "Cormorant Garamond", serif';
            ctx.fillStyle = colors.text;
            ctx.fillText('Ramos', 120, 230);

            // Linha dourada abaixo do nome
            ctx.strokeStyle = colors.gold;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(120, 300);
            ctx.lineTo(500, 300);
            ctx.stroke();

            // Título / área de atuação
            ctx.font = '400 18px "Inter", sans-serif';
            ctx.fillStyle = colors.gold;
            ctx.fillText('PMO · Projetos · Business Intelligence', 120, 320);

            // Breve descrição (opcional, inspirado no site)
            ctx.font = '300 14px "Inter", sans-serif';
            ctx.fillStyle = colors.low;
            ctx.fillText('Engenharia Civil · Gestão de Portfólio · Dados', 120, 355);

            // ===== LADO DIREITO =====
            // Cards de impacto (como no site)
            const rightX = 900; // posição inicial
            const cardWidth = 180;
            const cardHeight = 120;
            const cardSpacing = 20;

            // Card 1: Recursos viabilizados
            ctx.fillStyle = colors.bg3 || '#153450'; // fallback para bg3
            ctx.fillRect(rightX, 120, cardWidth, cardHeight);
            ctx.strokeStyle = colors.line;
            ctx.lineWidth = 1;
            ctx.strokeRect(rightX, 120, cardWidth, cardHeight);

            ctx.font = '300 14px "Inter", sans-serif';
            ctx.fillStyle = colors.low;
            ctx.fillText('Recursos viabilizados', rightX + 15, 140);

            ctx.font = '600 36px "Cormorant Garamond", serif';
            ctx.fillStyle = colors.text;
            ctx.fillText('R$500k', rightX + 15, 190);

            // Card 2: Redução de tempo
            ctx.fillStyle = colors.bg3 || '#153450';
            ctx.fillRect(rightX + cardWidth + cardSpacing, 120, cardWidth, cardHeight);
            ctx.strokeStyle = colors.line;
            ctx.strokeRect(rightX + cardWidth + cardSpacing, 120, cardWidth, cardHeight);

            ctx.font = '300 14px "Inter", sans-serif';
            ctx.fillStyle = colors.low;
            ctx.fillText('Redução no tempo', rightX + cardWidth + cardSpacing + 15, 140);
            ctx.fillText('de análise', rightX + cardWidth + cardSpacing + 15, 158);

            ctx.font = '600 36px "Cormorant Garamond", serif';
            ctx.fillStyle = colors.text;
            ctx.fillText('-75%', rightX + cardWidth + cardSpacing + 15, 200);

            // Card 3: Projetos simultâneos
            ctx.fillStyle = colors.bg3 || '#153450';
            ctx.fillRect(rightX + 2*(cardWidth + cardSpacing), 120, cardWidth, cardHeight);
            ctx.strokeStyle = colors.line;
            ctx.strokeRect(rightX + 2*(cardWidth + cardSpacing), 120, cardWidth, cardHeight);

            ctx.font = '300 14px "Inter", sans-serif';
            ctx.fillStyle = colors.low;
            ctx.fillText('Projetos', rightX + 2*(cardWidth + cardSpacing) + 15, 140);
            ctx.fillText('simultâneos', rightX + 2*(cardWidth + cardSpacing) + 15, 158);

            ctx.font = '600 36px "Cormorant Garamond", serif';
            ctx.fillStyle = colors.text;
            ctx.fillText('17+', rightX + 2*(cardWidth + cardSpacing) + 15, 200);

            // Ghost "PMO" no canto inferior direito
            ctx.font = '700 110px "Cormorant Garamond", serif';
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            ctx.fillText('PMO', width - 40, height - 20);

            // Botão de download
            document.getElementById('downloadBtn').addEventListener('click', function() {
                const link = document.createElement('a');
                link.download = 'wagner-ramos-linkedin-capa.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            console.log('Capa estilo portfólio gerada com sucesso!');
        })();
    </script>
</body>
</html>
