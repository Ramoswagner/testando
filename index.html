<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capa LinkedIn · Wagner Ramos (alta qualidade)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0B1E33;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .container {
            text-align: center;
        }
        canvas {
            width: 100%;
            max-width: 792px; /* metade para visualização, mas o original tem 1584px */
            height: auto;
            border: 2px solid #C4A35A;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn {
            margin-top: 30px;
            background: linear-gradient(135deg, #C4A35A, #D8B87A);
            color: #0B1E33;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 14px 32px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(196, 163, 90, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .note {
            color: #A0B3CC;
            font-size: 0.8rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="linkedinBanner" width="1584" height="396"></canvas>
        <br>
        <button class="btn" id="downloadBtn">⬇ Baixar Capa LinkedIn</button>
        <p class="note">Dimensões: 1584 x 396 px — qualidade profissional para capa do LinkedIn.</p>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('linkedinBanner');
            const ctx = canvas.getContext('2d');

            // Cores do tema
            const colors = {
                bg: '#0B1E33',
                text: '#F0F4FA',
                mid: '#A0B3CC',
                low: '#62748C',
                gold: '#C4A35A',
                glt: '#D8B87A',
                line: 'rgba(255,255,255,0.08)',
                lineg: 'rgba(196,163,90,0.25)'
            };

            const width = canvas.width;
            const height = canvas.height;

            // Ativar suavização de imagem para melhor qualidade
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            // Fundo principal
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, width, height);

            // Gradientes suaves (como no site)
            const grad1 = ctx.createRadialGradient(200, height - 100, 50, 250, height - 150, 600);
            grad1.addColorStop(0, 'rgba(196,163,90,0.1)');
            grad1.addColorStop(1, 'transparent');
            ctx.fillStyle = grad1;
            ctx.fillRect(0, 0, width, height);

            const grad2 = ctx.createRadialGradient(width - 200, 100, 50, width - 300, 150, 700);
            grad2.addColorStop(0, 'rgba(26,62,90,0.5)');
            grad2.addColorStop(1, 'transparent');
            ctx.fillStyle = grad2;
            ctx.fillRect(0, 0, width, height);

            // Linha vertical esquerda
            ctx.strokeStyle = colors.lineg;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(80, 60);
            ctx.lineTo(80, height - 60);
            ctx.stroke();

            // Coordenada geográfica no canto superior direito (vertical)
            ctx.save();
            ctx.translate(width - 50, 100);
            ctx.rotate(-Math.PI/2);
            ctx.font = '400 12px "Inter", monospace';
            ctx.fillStyle = colors.low;
            ctx.textAlign = 'left';
            ctx.fillText('19°55\'S · 43°56\'W', 0, 0);
            ctx.restore();

            // ----- LADO ESQUERDO: título e área de atuação -----
            const leftX = 120;

            // Ponto dourado (eyebrow)
            ctx.beginPath();
            ctx.arc(leftX, 85, 4, 0, 2 * Math.PI);
            ctx.fillStyle = colors.gold;
            ctx.fill();

            // Frase principal (PMO · Projetos · Business Intelligence) - maior destaque
            ctx.font = '500 36px "Cormorant Garamond", serif';
            ctx.fillStyle = colors.text;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('PMO · Projetos · Business Intelligence', leftX + 20, 70);

            // Linha dourada abaixo
            ctx.strokeStyle = colors.gold;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(leftX, 130);
            ctx.lineTo(leftX + 400, 130);
            ctx.stroke();

            // Subtítulo (Engenharia Civil · Gestão de Portfólio · Dados)
            ctx.font = '300 18px "Inter", sans-serif';
            ctx.fillStyle = colors.mid;
            ctx.fillText('Engenharia Civil · Gestão de Portfólio · Dados', leftX, 160);

            // ----- LADO DIREITO: contatos discretos com ícones alinhados -----
            const rightColX = width - 400;  // coluna para os ícones
            const textStartX = width - 360; // texto começa após o ícone
            const lineHeight = 45;
            const startY = 180;

            // Ícones usando caracteres especiais (discretos)
            const icons = [
                { icon: '✉', text: 'wagnerramoseng@gmail.com' },
                { icon: 'in', text: '/in/engwagnerramos' },
                { icon: '🌐', text: 'ramoswagner.github.io/inforamoswagner' }
            ];

            ctx.font = '300 16px "Inter", sans-serif';
            ctx.fillStyle = colors.low;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';

            icons.forEach((item, index) => {
                const y = startY + index * lineHeight;

                // Desenha o ícone em dourado suave
                ctx.fillStyle = colors.gold;
                ctx.font = '500 18px "Inter", sans-serif'; // ícone um pouco maior
                ctx.fillText(item.icon, rightColX, y);

                // Desenha o texto em low
                ctx.fillStyle = colors.low;
                ctx.font = '300 16px "Inter", sans-serif';
                ctx.fillText(item.text, textStartX, y);
            });

            // Pequenos detalhes: linha fina separando sutilmente a área de contatos
            ctx.strokeStyle = colors.line;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(width - 420, 140);
            ctx.lineTo(width - 420, startY + icons.length * lineHeight - 10);
            ctx.stroke();

            // Ghost "PMO" no canto inferior direito
            ctx.font = '700 110px "Cormorant Garamond", serif';
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            ctx.fillText('PMO', width - 40, height - 20);

            // Botão de download
            document.getElementById('downloadBtn').addEventListener('click', function() {
                const link = document.createElement('a');
                link.download = 'wagner-ramos-linkedin-capa.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            console.log('Capa de alta qualidade gerada com sucesso!');
        })();
    </script>
</body>
</html>
