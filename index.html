<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundo para Capa LinkedIn · Wagner Ramos</title>
    <style>
        body {
            background: #0B1E33;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .container {
            text-align: center;
        }
        canvas {
            width: 100%;
            max-width: 792px; /* metade do tamanho real */
            height: auto;
            border: 2px solid #C4A35A;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn {
            margin-top: 30px;
            background: linear-gradient(135deg, #C4A35A, #D8B87A);
            color: #0B1E33;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 14px 32px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(196, 163, 90, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .note {
            color: #A0B3CC;
            font-size: 0.8rem;
            margin-top: 15px;
        }
    </style>
    <!-- Fonte apenas para a coordenada (pode ser removida se preferir) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <canvas id="linkedinBanner" width="1584" height="396"></canvas>
        <br>
        <button class="btn" id="downloadBtn">⬇ Baixar Fundo (PNG)</button>
        <p class="note">Dimensões: 1584 x 396 px — alta qualidade. Use como base no Canva.</p>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('linkedinBanner');
            const ctx = canvas.getContext('2d');

            // Cores do tema (apenas as necessárias para o fundo)
            const colors = {
                bg: '#0B1E33',
                low: '#62748C',
                gold: '#C4A35A',
                lineg: 'rgba(196,163,90,0.25)'
            };

            const width = canvas.width;
            const height = canvas.height;

            // Ativar alta qualidade
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            // 1. Fundo principal
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, width, height);

            // 2. Gradientes suaves (característicos do site)
            // Gradiente inferior esquerdo (dourado suave)
            const grad1 = ctx.createRadialGradient(200, height - 100, 50, 250, height - 150, 600);
            grad1.addColorStop(0, 'rgba(196,163,90,0.1)');
            grad1.addColorStop(1, 'transparent');
            ctx.fillStyle = grad1;
            ctx.fillRect(0, 0, width, height);

            // Gradiente superior direito (azul profundo)
            const grad2 = ctx.createRadialGradient(width - 200, 100, 50, width - 300, 150, 700);
            grad2.addColorStop(0, 'rgba(26,62,90,0.5)');
            grad2.addColorStop(1, 'transparent');
            ctx.fillStyle = grad2;
            ctx.fillRect(0, 0, width, height);

            // 3. Linha vertical esquerda (característica)
            ctx.strokeStyle = colors.lineg;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(80, 60);
            ctx.lineTo(80, height - 60);
            ctx.stroke();

            // 4. Coordenada geográfica no canto superior direito (vertical)
            ctx.save();
            ctx.translate(width - 50, 100);
            ctx.rotate(-Math.PI/2);
            ctx.font = '400 12px "Inter", monospace';
            ctx.fillStyle = colors.low;
            ctx.textAlign = 'left';
            ctx.fillText('19°55\'S · 43°56\'W', 0, 0);
            ctx.restore();

            // 5. Ghost "PMO" no canto inferior direito (extremamente sutil)
            // Usando Cormorant Garamond, mas como é apenas um ghost, qualquer fonte serifada funciona
            // Vamos usar uma fonte padrão, mas para manter a identidade, carregamos a Cormorant via sistema
            ctx.font = '700 110px "Cormorant Garamond", "Times New Roman", serif';
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            ctx.fillText('PMO', width - 40, height - 20);

            // Botão de download
            document.getElementById('downloadBtn').addEventListener('click', function() {
                const link = document.createElement('a');
                link.download = 'fundo-linkedin-wagner-ramos.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            console.log('Fundo de alta qualidade gerado com sucesso!');
        })();
    </script>
</body>
</html>
